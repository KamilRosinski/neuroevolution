<div>
  <button (click)="navigateToSettings()">back to settings</button>
  <evo-controls [status]="status$ | async"
                (start)="startEvolution()"
                (stop)="stopEvolution()"
                (reset)="resetEvolution()"></evo-controls>
  <p>range: {{(settings$ | async)?.range}}</p>
  <div>
    <p>generations:</p>
    <ul>
      <li *ngFor="let generation of generations$ | async">id: {{generation.id}}, score: {{generation.score}}</li>
    </ul>
  </div>
</div>
