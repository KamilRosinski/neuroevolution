<div>
  <evo-controls [status]="status$ | async"
                (start)="onStart()"
                (stop)="onStop()"
                (reset)="onReset()"></evo-controls>
  <p>range: {{(settings$ | async)?.range}}</p>
  <div>
    <p>generations:</p>
    <ul>
      <li *ngFor="let generation of generations$ | async">id: {{generation.id}}, score: {{generation.score}}</li>
    </ul>
  </div>
</div>
