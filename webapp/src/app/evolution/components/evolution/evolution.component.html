<div>
  <button (click)="start()">start</button>
  <button (click)="stop()">stop</button>
  <p>id: {{evolutionId$ | async}}</p>
  <p>status: {{status$ | async}}</p>
  <div>
    <p>generations:</p>
    <ul>
      <li *ngFor="let generation of generations$ | async">id: {{generation.id}}, score: {{generation.score}}</li>
    </ul>
  </div>
</div>
